name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # scripts/build_pdfs.py derives each manual's title-page date from
          # the most recent commit that touched the manual's source dir or
          # the Pandoc template; needs full history.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict

      # ------------------------------------------------------------------
      # Pandoc PDF build: one PDF per manual registered in
      # pandoc/manuals.yaml, landing at site/pdf/<id>.pdf so they ship
      # alongside the HTML in the Pages artifact.
      # ------------------------------------------------------------------

      - name: Install Pandoc
        run: |
          PANDOC_VERSION=3.5
          wget -q "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo dpkg -i "pandoc-${PANDOC_VERSION}-1-amd64.deb"
          rm "pandoc-${PANDOC_VERSION}-1-amd64.deb"
          pandoc --version | head -1

      # TeX Live install, uncached.
      #
      # awalsh128/cache-apt-pkgs-action was evaluated and abandoned: on cache
      # hits it restores the .deb file payloads but does NOT replay the
      # TeX Live post-install hooks that register fmt entries in
      # fmtutil.cnf and generate xelatex.fmt. The first post-cache-bump
      # run always succeeded (cache miss = fresh install = hooks ran),
      # subsequent runs always failed with
      #   ! I can't find the format file `xelatex.fmt'!
      # Vanilla apt-get install runs the postinsts on every job, which is
      # ~5 minutes per build — acceptable given push cadence.
      - name: Install TeX Live packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-lang-spanish \
            lmodern

      - name: Build PDF manuals
        run: python scripts/build_pdfs.py --all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # scripts/build_pdfs.py derives each manual's title-page date from
          # the most recent commit that touched the manual's source dir or
          # the Pandoc template; needs full history.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict

      # ------------------------------------------------------------------
      # Pandoc PDF build: one PDF per manual registered in
      # pandoc/manuals.yaml, landing at site/pdf/<id>.pdf so they ship
      # alongside the HTML in the Pages artifact.
      # ------------------------------------------------------------------

      - name: Install Pandoc
        run: |
          PANDOC_VERSION=3.5
          wget -q "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo dpkg -i "pandoc-${PANDOC_VERSION}-1-amd64.deb"
          rm "pandoc-${PANDOC_VERSION}-1-amd64.deb"
          pandoc --version | head -1

      # TeX Live install, uncached.
      #
      # awalsh128/cache-apt-pkgs-action was evaluated and abandoned: on cache
      # hits it restores the .deb file payloads but does NOT replay the
      # TeX Live post-install hooks that register fmt entries in
      # fmtutil.cnf and generate xelatex.fmt. The first post-cache-bump
      # run always succeeded (cache miss = fresh install = hooks ran),
      # subsequent runs always failed with
      #   ! I can't find the format file `xelatex.fmt'!
      # Vanilla apt-get install runs the postinsts on every job, which is
      # ~5 minutes per build — acceptable given push cadence.
      - name: Install TeX Live packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-lang-spanish \
            fonts-texgyre \
            lmodern
          # fonts-texgyre installs the OpenType TeX Gyre family (Heros,
          # Cursor, Pagella, ...) that our Pandoc template pulls via
          # fontspec. texlive-fonts-extra ships the Type 1 variants which
          # pdfLaTeX can use, but XeLaTeX/fontspec needs the OTFs.

      - name: Build PDF manuals
        run: python scripts/build_pdfs.py --all

      # On failure, capture pandoc's intermediate working directory (the
      # .log / .aux / .tex files xelatex produced before crashing) so we
      # can diagnose from the actual LaTeX log instead of the stderr
      # tail. Pandoc writes these under /tmp/tex2pdf.*/ when
      # --pdf-engine=xelatex is used.
      - name: Upload pandoc intermediates on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pandoc-intermediate
          path: |
            /tmp/tex2pdf.*
            build/pandoc/
            build/pdf/

      # ------------------------------------------------------------------
      # PDF image-sizing regression gate.
      #
      # Catches two failure classes that Pandoc + XeLaTeX render without
      # complaint but produce visually broken PDFs:
      #   - Stretched icons: tiny toolbar buttons blown up to \linewidth
      #     because Pandoc dropped their width attribute.
      #   - Natural-DPI overflows: large screenshots without a valid width
      #     rendered at 72 dpi, spilling off the page.
      #
      # Fails the whole deploy if anything trips either gate, so we never
      # publish a broken PDF. See scripts/check_pdf_images.py for the
      # exact thresholds and the per-class symptom table.
      # ------------------------------------------------------------------
      - name: Install Poppler utilities
        run: sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Check PDF image sizing
        run: |
          set +e
          fail=0
          for id in \
              qgis-reference-riverflow2d-en \
              qgis-reference-oilflow2d-en \
              qgis-reference-hydrobid-flood-en \
              tutorials-riverflow2d-en \
              tutorials-oilflow2d-en \
              tutorials-hydrobid-flood-en; do
            echo "::group::check: $id"
            python scripts/check_pdf_images.py "site/pdf/${id}.pdf" --top 20
            rc=$?
            echo "::endgroup::"
            if [ $rc -ne 0 ]; then
              echo "::error file=site/pdf/${id}.pdf::PDF image sizing check failed for ${id} (exit $rc) — see the '$id' log group above for the offending pages and rendered dimensions"
              fail=1
            fi
          done
          if [ $fail -ne 0 ]; then
            echo ""
            echo "One or more PDFs have image-sizing regressions. Fix locally with:"
            echo "  python scripts/build_pdfs.py --manual <id> --keep-build"
            echo "  python scripts/check_pdf_images.py site/pdf/<id>.pdf --render"
            echo "then inspect the rendered PNGs under site/pdf/<id>_flagged_pages/."
          fi
          exit $fail

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
